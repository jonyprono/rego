version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: intervention_mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: intervention_reports
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

volumes:
  mysql_data:
